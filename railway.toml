[build]
builder = "nixpacks"
buildCommand = "npm install && npm run build"

[deploy]
startCommand = "npm run start"
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "on_failure"

# Environment variables to set in Railway dashboard:
#
#   PORT          — Railway sets this automatically, the server reads it
#   DB_DIR        — path where db.json is stored, e.g. /data
#   UPLOADS_DIR   — path where product images are stored, e.g. /data/uploads
#
# Persistent volume:
#   Add a Railway volume and mount it at /data so that db.json and uploaded
#   images survive redeploys. Without a volume, data is reset on each deploy.
